# PostgreSQL configuration for backup container
# This is a minimal configuration used for backup operations

# Connection settings
listen_addresses = '*'
port = 5432

# Memory settings (minimal for backup container)
shared_buffers = 128MB
work_mem = 16MB

# Logging
log_destination = 'stderr'
logging_collector = off
log_statement = 'none'

# Locale
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
