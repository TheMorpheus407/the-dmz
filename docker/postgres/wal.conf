# PostgreSQL configuration for WAL archiving and PITR
# This file is loaded via POSTGRES_INITDB_ARGS in docker-compose

# WAL Settings
wal_level = replica
max_wal_senders = 3
max_replication_slots = 3

# Archive settings (enabled when archive_mode is on)
# For development: use local file-based archiving
# For production: configure S3 archive_command
archive_mode = on
archive_command = 'test -f /archive WAL file path for local testing'

# WAL segment size (16MB default, adequate for most workloads)
# min_wal_size = 80MB
# max_wal_size = 1GB

# Archive timeout - switch WAL segments after this time
# Ensures PITR can recover to within this window
archive_timeout = 1h

# Checkpoint settings
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# WAL keep segments (for replication)
wal_keep_size = 1GB
