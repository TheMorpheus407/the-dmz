# Docker Compose development environment for The DMZ: Archive Gate
#
# Services:
#   postgres  — PostgreSQL 16 on localhost:5432
#   redis     — Redis 7 on localhost:6379
#   adminer   — Database UI on localhost:8080 (opt-in via --profile tools)
#   migrate   — Run Drizzle database migrations (opt-in via --profile migrate)
#   backup    — PostgreSQL backup container (opt-in via --profile backup)
#   prometheus — Metrics collection on localhost:9090
#   grafana   — Dashboards on localhost:3000
#   alertmanager — Alert handling on localhost:9093
#
# Connection strings:
#   PostgreSQL: postgresql://dmz:dmz_dev@localhost:5432/dmz_dev
#   Redis:      redis://localhost:6379
#
# Database tools (pgAdmin, TablePlus, DBeaver, Adminer):
#   Host: localhost | Port: 5432 | User: dmz | Password: dmz_dev | Database: dmz_dev
#
# Monitoring:
#   Prometheus: http://localhost:9090
#   Grafana: http://localhost:3000 (admin/admin)
#   Alertmanager: http://localhost:9093
#
# Backup:
#   Backups stored in ./docker/backup/backups (local) or S3 (production)
#   Run: docker compose --profile backup up -d
#
# Startup ordering (enforced via depends_on + condition: service_healthy):
#   1. postgres (healthy when pg_isready succeeds)
#   2. redis (healthy when redis-cli ping succeeds)
#   3. migrate (runs Drizzle migrations against healthy postgres, then exits)
#   4. backup (optional, runs daily backups)
#   5. api/web application services (added in issue #32, depend on all above)
#   6. monitoring services (prometheus, grafana, alertmanager)
#
# Migration state tracking:
#   Drizzle ORM tracks applied migrations in the database itself via its
#   __drizzle_migrations journal table. No separate volume is needed.
#
# Usage:
#   pnpm services:up       — start infrastructure in background
#   pnpm services:down     — stop infrastructure
#   pnpm services:reset    — stop, remove volumes, restart (clean slate)
#   pnpm services:logs     — tail service logs
#   docker compose --profile tools up -d    — include Adminer
#   docker compose --profile migrate up migrate  — run database migrations
#   docker compose --profile monitoring up -d     — include monitoring stack
#   docker compose --profile backup up -d         — include backup services

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dmz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dmz_dev}
      POSTGRES_DB: ${POSTGRES_DB:-dmz_dev}
      POSTGRES_INITDB_ARGS: --waldir=/var/lib/postgresql/data/pg_wal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_wal:/var/lib/postgresql/data/pg_wal
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
      - ./docker/backup:/usr/local/bin:ro
      - ./docker/backup:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dmz} -d ${POSTGRES_DB:-dmz_dev}']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c max_replication_slots=3
      -c archive_mode=on
      -c archive_command=/usr/local/bin/archive_wal.sh %p
      -c archive_timeout=1h
      -c checkpoint_timeout=15min
      -c wal_keep_size=1GB

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer:latest
    profiles: ['tools']
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

  # Run Drizzle ORM database migrations.
  # Opt-in via: docker compose --profile migrate up migrate
  # This service starts only after postgres is healthy, runs migrations, then exits.
  migrate:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dmz}:${POSTGRES_PASSWORD:-dmz_dev}@postgres:5432/${POSTGRES_DB:-dmz_dev}
    command: ['sh', '-c', 'corepack enable && pnpm --filter api db:migrate']
    profiles: ['migrate']

  # PostgreSQL backup service.
  # Opt-in via: docker compose --profile backup up -d
  # Runs daily backups at 2:00 AM UTC.
  # Set S3_BUCKET environment variable for S3 uploads.
  backup:
    image: postgres:16-alpine
    profiles: ['backup']
    volumes:
      - ./docker/backup:/backups:rw
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-dmz_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dmz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dmz_dev}
      DATABASE_HOST: ${POSTGRES_HOST:-postgres}
      DATABASE_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_NAME: ${POSTGRES_DB:-dmz_dev}
      DATABASE_USER: ${POSTGRES_USER:-dmz}
      S3_BUCKET: ${S3_BUCKET:-}
      BACKUP_DIR: /backups
      RETENTION_DAYS: 30
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'echo "Backup container running. Use docker compose exec backup ./backup.sh to run backup manually." && sleep infinity'
    entrypoint: []

  # -------------------------------------------------------------------------
  # Application services (issue #32 — Application Dockerfiles for API and Web)
  # -------------------------------------------------------------------------
  # When adding application services, use the following dependency structure
  # to enforce the startup ordering: postgres -> redis -> migrate -> app
  #
  #   api:
  #     build:
  #       context: .
  #       dockerfile: apps/api/Dockerfile
  #     depends_on:
  #       postgres:
  #         condition: service_healthy
  #       redis:
  #         condition: service_healthy
  #       migrate:
  #         condition: service_completed_successfully
  #     environment:
  #       DATABASE_URL: postgresql://${POSTGRES_USER:-dmz}:${POSTGRES_PASSWORD:-dmz_dev}@postgres:5432/${POSTGRES_DB:-dmz_dev}
  #       REDIS_URL: redis://redis:6379
  #     ports:
  #       - '3001:3001'
  #
  #   web:
  #     build:
  #       context: .
  #       dockerfile: apps/web/Dockerfile
  #     depends_on:
  #       api:
  #         condition: service_healthy
  #     ports:
  #       - '3000:3000'
  # -------------------------------------------------------------------------

  # -------------------------------------------------------------------------
  # Monitoring stack (issue #182 — Monitoring and Observability)
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    profiles: ['monitoring']
    ports:
      - '9090:9090'
    volumes:
      - ./docker/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      - redis
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.26.0
    profiles: ['monitoring']
    ports:
      - '9093:9093'
    volumes:
      - ./docker/monitoring/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:10.2.2
    profiles: ['monitoring']
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.54.0
    profiles: ['monitoring']
    ports:
      - '9121:9121'
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    profiles: ['monitoring']
    ports:
      - '9187:9187'
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-dmz}:${POSTGRES_PASSWORD:-dmz_dev}@postgres:5432/${POSTGRES_DB:-dmz_dev}?sslmode=disable
    depends_on:
      - postgres

  # -------------------------------------------------------------------------

volumes:
  postgres_data:
  postgres_wal:
  prometheus_data:
  alertmanager_data:
  grafana_data:
